# ── MapWatch — Blink-dot example ──────────────────────────────────────────────
#
# Demonstrates DC baseline markers and multi-alert aggregation.
#
# End-user (pull published image):
#   cd examples/blink-dot && docker compose up -d
#
# Developer (build from local source):
#   cd examples/blink-dot && docker compose up --build
#
# Open http://localhost:8080 and watch the dots appear within ~15 seconds.

services:
  mapwatch:
    build:
      context: ../../
      dockerfile: examples/blink-dot/Dockerfile
    image: ghcr.io/teochenglim/mapwatch:latest
    ports:
      - "8080:8080"
    volumes:
      - ./mapwatch.yaml:/mapwatch.yaml:ro
    environment:
      MAPWATCH_SERVER_ADDR: ":8080"
      MAPWATCH_PROMETHEUS_URL: "http://prometheus:9090"
    depends_on:
      - prometheus
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.52.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alerts.yml:/etc/prometheus/alerts.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    restart: unless-stopped

volumes:
  prometheus_data:
