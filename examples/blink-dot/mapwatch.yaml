server:
  addr: ":8080"

modules:
  sound: true        # alert sound on marker.add
  leaderboard: false # no leaderboard in blink-dot (no RisingWave)
  stats: false

# ── Base-map tile themes ──────────────────────────────────────────────────────
tiles:
  - id: dark
    label: Dark
    url: "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png"
    attribution: "&copy; CartoDB"
    default: true
  - id: light
    label: Light
    url: "https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png"
    attribution: "&copy; CartoDB"
  - id: streets
    label: Streets
    url: "https://tile.openstreetmap.org/{z}/{x}/{y}.png"
    attribution: "&copy; OpenStreetMap contributors"
  - id: satellite
    label: Satellite
    url: "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}"
    attribution: "&copy; Esri"

prometheus:
  url: http://prometheus:9090
  timeout: 10s

# ── Heatmap: choropleth region overlay ───────────────────────────────────────
# Rectangles drawn on the map, coloured by worst alert severity inside the region.
heatmap:
  regions:
    - name: "West SG"
      bounds: [[1.3203, 103.7054], [1.3958, 103.7885]]
    - name: "Central SG"
      bounds: [[1.3134, 103.8002], [1.3533, 103.8764]]

# Five Singapore datacenters — shown as green baseline dots on map load.
# sg-dc-1 fires 1 alert; sg-dc-2 fires 2 alerts; the rest stay healthy (green).
locations:
  sg-dc-1: w21zd3   # Singapore CBD
  sg-dc-2: w21z8k   # Singapore West
  sg-dc-3: w21zb    # Singapore North
  sg-dc-4: w21ze    # Singapore East
  sg-dc-5: w21z9    # Singapore Central

# PromQL templates shown in the side panel when clicking an alert.
query_templates:
  HighCPU:
    - label: "CPU Usage %"
      query: 'rate(node_cpu_seconds_total{mode="user",instance="{{.instance}}"}[5m]) * 100'
  DiskFull:
    - label: "Disk Used %"
      query: '100 - (node_filesystem_free_bytes{instance="{{.instance}}"} / node_filesystem_size_bytes * 100)'
  MemoryLeak:
    - label: "Memory Used %"
      query: '100 - (node_memory_MemAvailable_bytes{instance="{{.instance}}"} / node_memory_MemTotal_bytes * 100)'
  default:
    - label: "CPU Usage %"
      query: 'rate(node_cpu_seconds_total{mode="user",instance="{{.instance}}"}[5m]) * 100'
