# Blink-dot demo alert rules.
#
# Demonstrates the DC baseline marker feature and multi-alert aggregation:
#   • 5 green dots appear immediately (one per location in mapwatch.yaml)
#   • sg-dc-1 (CBD)  → 1 critical alert  → dot turns red, no badge
#   • sg-dc-2 (West) → 2 critical alerts → dot turns red with badge "2"
#   • sg-dc-3/4/5    → no alerts         → stay green (healthy)
#
# All rules use vector(1) so they fire immediately without real metrics.

groups:
  - name: blink-dot-cbd
    rules:
      - alert: HighCPU
        expr: vector(1)
        for: 0s
        labels:
          severity: critical
          datacenter: sg-dc-1
          instance: sg-prod-cbd-1
        annotations:
          summary: "CPU above 90% — single alert on sg-dc-1 (no badge)"
          description: "Click the dot to see the alert detail panel"

  - name: blink-dot-west
    rules:
      - alert: DiskFull
        expr: vector(1)
        for: 0s
        labels:
          severity: critical
          datacenter: sg-dc-2
          instance: sg-prod-west-1
        annotations:
          summary: "Disk usage above 85%"
          description: "First of two alerts on sg-dc-2"

      - alert: MemoryLeak
        expr: vector(1)
        for: 0s
        labels:
          severity: critical
          datacenter: sg-dc-2
          instance: sg-prod-west-2
        annotations:
          summary: "Memory leak detected"
          description: "Second alert on sg-dc-2 — dot shows badge '2', click for list"
