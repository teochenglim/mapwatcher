# Heatmap demo alert rules.
#
# 13 alerts spread across APAC, US, and EU — intentionally dense in
# Singapore and US East Coast so the heatmap overlay shows clear hot-spots.
#
# Heatmap intensity is driven by severity:
#   critical → 1.0 (hottest)
#   warning  → 0.6 (warm)
#   info     → 0.3 (cool)
#
# All rules use vector(1) so they fire immediately without real metrics.

groups:
  # ─── APAC ──────────────────────────────────────────────────────────────────
  - name: heatmap-apac
    rules:
      - alert: SG_HighCPU
        expr: vector(1)
        for: 0s
        labels:
          severity: critical
          geohash: w21zd3         # Singapore CBD
          instance: sg-web-1
        annotations:
          summary: "APAC web cluster CPU critical"

      - alert: SG_MemoryLeak
        expr: vector(1)
        for: 0s
        labels:
          severity: critical
          geohash: w21zb          # Singapore North
          instance: sg-web-2
        annotations:
          summary: "APAC web cluster memory leak"

      - alert: SG_DiskFull
        expr: vector(1)
        for: 0s
        labels:
          severity: warning
          geohash: w21z8k         # Singapore West
          instance: sg-db-1
        annotations:
          summary: "APAC database disk filling up"

      - alert: SG_NetworkLatency
        expr: vector(1)
        for: 0s
        labels:
          severity: info
          geohash: w21zd          # Singapore East
          instance: sg-db-2
        annotations:
          summary: "APAC cross-region latency elevated"

      - alert: JP_ServiceDown
        expr: vector(1)
        for: 0s
        labels:
          severity: critical
          lat: "35.68"
          lng: "139.69"
          instance: jp-prod-1
          datacenter: ap-northeast-1
        annotations:
          summary: "Tokyo service unreachable"

      - alert: AU_DeployFailed
        expr: vector(1)
        for: 0s
        labels:
          severity: warning
          lat: "-33.87"
          lng: "151.21"
          instance: au-prod-1
          datacenter: ap-southeast-2
        annotations:
          summary: "Sydney deployment rollback"

  # ─── US ────────────────────────────────────────────────────────────────────
  - name: heatmap-us
    rules:
      - alert: US_East_CPU
        expr: vector(1)
        for: 0s
        labels:
          severity: critical
          geohash: dr5reg         # New York
          instance: us-east-1
        annotations:
          summary: "US East API servers CPU spike"

      - alert: US_East_Disk
        expr: vector(1)
        for: 0s
        labels:
          severity: warning
          geohash: dr5r           # New York metro (wider)
          instance: us-east-2
        annotations:
          summary: "US East database disk at 80%"

      - alert: US_East_OOM
        expr: vector(1)
        for: 0s
        labels:
          severity: critical
          lat: "40.71"
          lng: "-74.01"
          instance: us-east-3
        annotations:
          summary: "US East OOM kill detected"

      - alert: US_West_Latency
        expr: vector(1)
        for: 0s
        labels:
          severity: warning
          geohash: 9q8yy          # Los Angeles
          instance: us-west-1
        annotations:
          summary: "US West CDN latency elevated"

      - alert: US_West_Deploy
        expr: vector(1)
        for: 0s
        labels:
          severity: info
          geohash: 9q8y           # LA metro (wider)
          instance: us-west-2
        annotations:
          summary: "US West canary deployment"

  # ─── EU ────────────────────────────────────────────────────────────────────
  - name: heatmap-eu
    rules:
      - alert: EU_West_CPU
        expr: vector(1)
        for: 0s
        labels:
          severity: critical
          geohash: gc6uf          # Dublin / EU West
          instance: eu-west-1
        annotations:
          summary: "EU West primary cluster CPU critical"

      - alert: EU_Central_Disk
        expr: vector(1)
        for: 0s
        labels:
          severity: warning
          geohash: u4pruyd        # Berlin
          instance: eu-central-1
        annotations:
          summary: "EU Central archive disk at 75%"
