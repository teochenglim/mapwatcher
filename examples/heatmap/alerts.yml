# Heatmap demo alert rules — Singapore only.
#
# Markers are concentrated in the CBD (critical) and spread outward
# through Central/East (warning) to West/North (info).
# This creates a clear hot-spot gradient visible in the heatmap overlay.
#
# Heatmap intensity by severity:  critical=1.0  warning=0.6  info=0.3
# All rules use vector(1) so they fire immediately without real metrics.

groups:
  # ─── CBD hot-spot (critical) ────────────────────────────────────────────────
  - name: heatmap-cbd
    rules:
      - alert: CBD_HighCPU
        expr: vector(1)
        for: 0s
        labels:
          severity: critical
          geohash: w21zd3          # Singapore CBD / Raffles Place
          instance: sg-prod-cbd-1
        annotations:
          summary: "API cluster CPU critical"

      - alert: CBD_MemoryLeak
        expr: vector(1)
        for: 0s
        labels:
          severity: critical
          geohash: w21zd4          # Tanjong Pagar
          instance: sg-prod-cbd-2
        annotations:
          summary: "Memory leak detected on payment service"

      - alert: CBD_DiskIO
        expr: vector(1)
        for: 0s
        labels:
          severity: critical
          geohash: w21zd1          # Marina Bay / CBD adjacent
          instance: sg-prod-cbd-3
        annotations:
          summary: "Database IOPS saturation"

  # ─── Central / East (warning) ────────────────────────────────────────────────
  - name: heatmap-central
    rules:
      - alert: East_ServiceDown
        expr: vector(1)
        for: 0s
        labels:
          severity: warning
          datacenter: sg-east
          instance: sg-prod-east-1
        annotations:
          summary: "Changi edge node intermittent failures"

      - alert: North_DiskFull
        expr: vector(1)
        for: 0s
        labels:
          severity: warning
          datacenter: sg-north
          instance: sg-prod-north-1
        annotations:
          summary: "Archive disk at 80%"

  # ─── West / Outskirts (info) ─────────────────────────────────────────────────
  - name: heatmap-west
    rules:
      - alert: West_SlowQuery
        expr: vector(1)
        for: 0s
        labels:
          severity: info
          datacenter: sg-west
          instance: sg-prod-west-1
        annotations:
          summary: "Query latency p99 elevated"

      - alert: West_DeployCanary
        expr: vector(1)
        for: 0s
        labels:
          severity: info
          geohash: w21z9           # Central-West
          instance: sg-prod-west-2
        annotations:
          summary: "Canary deployment in progress"
