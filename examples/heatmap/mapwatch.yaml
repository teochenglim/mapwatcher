server:
  addr: ":8080"

prometheus:
  url: http://prometheus:9090
  timeout: 10s

# Known Singapore datacenter locations — rendered as baseline green dots on load.
# Alerts referencing these via `datacenter:` label are aggregated onto the DC dot.
locations:
  sg-cbd:    w21zd3   # Singapore CBD / Raffles Place
  sg-east:   w21ze    # Singapore East (Tampines/Changi)
  sg-north:  w21zb    # Singapore North (Woodlands/Yishun)
  sg-west:   w21z8k   # Singapore West (Jurong)

# PromQL templates shown in the side panel when clicking a marker.
query_templates:
  default:
    - label: "CPU Usage %"
      query: 'rate(node_cpu_seconds_total{mode="user",instance="{{.instance}}"}[5m]) * 100'
    - label: "Memory Used %"
      query: '100 - (node_memory_MemAvailable_bytes{instance="{{.instance}}"} / node_memory_MemTotal_bytes * 100)'
