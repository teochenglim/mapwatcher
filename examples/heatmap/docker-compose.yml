# ── MapWatch — Heatmap example ────────────────────────────────────────────────
#
# Demonstrates the Leaflet.heat density overlay across 13 global alerts
# spread across APAC, US, and EU regions.
#
# Start:
#   cd examples/heatmap
#   docker compose up -d
#
# Open http://localhost:8082, then press the "Heatmap" button in the toolbar
# (or run `MapWatch.toggleHeatmap()` in the browser console) to enable the overlay.

services:
  mapwatch:
    image: ghcr.io/teochenglim/mapwatch:latest
    ports:
      - "8082:8080"
    volumes:
      - ./mapwatch.yaml:/mapwatch.yaml:ro
    environment:
      MAPWATCH_SERVER_ADDR: ":8080"
      MAPWATCH_PROMETHEUS_URL: "http://prometheus:9090"
    depends_on:
      - prometheus
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.52.0
    ports:
      - "9092:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alerts.yml:/etc/prometheus/alerts.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    ports:
      - "9095:9093"
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    restart: unless-stopped

volumes:
  prometheus_data:
