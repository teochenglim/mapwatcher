global:
  scrape_interval:     2s   # Q5: fast scan so demo responds quickly
  evaluation_interval: 2s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: exporter
    static_configs:
      - targets: ["exporter:8000"]
    scrape_interval: 2s
