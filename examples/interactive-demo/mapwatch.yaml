server:
  addr: ":8080"

# ── Base-map tile themes ──────────────────────────────────────────────────────
tiles:
  - id: dark
    label: Dark
    url: "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png"
    attribution: "&copy; CartoDB"
    default: true
  - id: light
    label: Light
    url: "https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png"
    attribution: "&copy; CartoDB"
  - id: streets
    label: Streets
    url: "https://tile.openstreetmap.org/{z}/{x}/{y}.png"
    attribution: "&copy; OpenStreetMap contributors"
  - id: satellite
    label: Satellite
    url: "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}"
    attribution: "&copy; Esri"

# No Prometheus in this demo — markers arrive via POST /api/tap → WebSocket directly.
# Uncomment and add prometheus/alertmanager services if you want the alerting pipeline.
# prometheus:
#   url: http://prometheus:9090

# Singapore datacenters — green baseline dots.
locations:
  sg-dc-1: w21zd3   # Singapore CBD
  sg-dc-2: w21z8k   # Singapore West
  sg-dc-3: w21zb    # Singapore North
  sg-dc-4: w21ze    # Singapore East
  sg-dc-5: w21z9    # Singapore Central

# Optional modules — all on for the interactive demo.
modules:
  sound: true
  leaderboard: true
  stats: true

# Leaderboard API served by the exporter (proxied by MapWatch at /api/leaderboard).
leaderboard_url: http://exporter:8000/leaderboard
