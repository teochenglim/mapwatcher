# ── Local demo override ───────────────────────────────────────────────────────
#
# Overrides the mapwatch service to use Dockerfile-local (skips GeoJSON downloads).
# Use via:  make demo
#           docker compose -f docker-compose.yml -f docker-compose-local.yml up --build
#
services:
  mapwatch:
    build:
      context: .
      dockerfile: Dockerfile-local
    image: mapwatch-local
    # No --data-dir flag; GeoJSON overlay layers are unavailable but all other
    # features (alerts, heatmap, blink-dot, drag-to-select) work normally.
    command: ["serve"]
