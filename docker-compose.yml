# ── MapWatch — Developer / baseline demo (modules OFF) ───────────────────────
#
# Minimal stack: mapwatch + prometheus + alertmanager only.
# Modules (sound/leaderboard/stats) are all OFF — edit mapwatch.yaml to enable.
#
# For the full Redpanda → RisingWave pipeline demo:
#   cd examples/interactive-demo && docker compose up --build
#
# For the blink-dot demo with sound:
#   cd examples/blink-dot && docker compose up
#
# Quick start:
#   docker compose up --build
#   open http://localhost:8080
#   open http://localhost:8080/mobile.html   ← tap the map

services:
  mapwatch:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/teochenglim/mapwatch:latest
    ports:
      - "8080:8080"
    volumes:
      - ./mapwatch.yaml:/mapwatch.yaml:ro
    environment:
      MAPWATCH_SERVER_ADDR: ":8080"
      MAPWATCH_PROMETHEUS_URL: "http://prometheus:9090"
    depends_on:
      - prometheus
      - alertmanager
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.52.0
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    ports:
      - "9093:9093"
    volumes:
      - ./deploy/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    restart: unless-stopped

volumes:
  prometheus_data:
