server:
  addr: ":8080"

prometheus:
  url: http://prometheus:9090          # server → Prometheus (internal Docker hostname)
  external_url: http://localhost:9090  # browser → Prometheus (override for remote deployments)
  timeout: 10s

spread:
  radius: 0.01

# ── Feature modules (all off by default) ─────────────────────────────────────
# Enable per-example in their own mapwatch.yaml:
#   examples/blink-dot/     → sound: true
#   examples/interactive-demo/ → sound+leaderboard+stats: true
modules:
  sound: false
  leaderboard: false
  stats: false

# leaderboard_url: http://exporter:8000/leaderboard   # uncomment when running interactive-demo

# ── Baseline locations ────────────────────────────────────────────────────────
# Each entry renders as a green "healthy" dot on map load.
# When an alert fires with a matching label value, the dot turns red/yellow.
# Supported alert labels (checked in geo_label_priority order):
#   datacenter: sg-dc-1   ← most common
#   location:   sg-dc-1   ← alias for datacenter
#   region:     sg-dc-1   ← same lookup
# sg-dc-1 fires 1 alert; sg-dc-2 fires 2 alerts; the rest stay green.
locations:
  sg-dc-1: w21zd3   # Singapore CBD
  sg-dc-2: w21z8k   # Singapore West
  sg-dc-3: w21zb    # Singapore North
  sg-dc-4: w21ze    # Singapore East
  sg-dc-5: w21z9    # Singapore Central

# ── Heatmap: choropleth region overlay ───────────────────────────────────────
# Each region is drawn as a filled rectangle coloured by worst alert severity.
# Any marker whose lat/lng falls inside the bounds is counted in that region.
# Shown by default; toggle off with the Heatmap button in the toolbar.
#
# Required: name, bounds: [[lat_sw, lng_sw], [lat_ne, lng_ne]]
# Optional: color: "#hex"  — overrides severity colour (red/amber/blue)
heatmap:
  regions:
    - name: "West SG"
      bounds: [[1.3203, 103.7054], [1.3958, 103.7885]]
    - name: "Central SG"
      bounds: [[1.3134, 103.8002], [1.3533, 103.8764]]

# ── Geo resolution priority ───────────────────────────────────────────────────
# Labels checked in order when placing an alert on the map.
# Sentinel values:  "geohash" → labels.geohash
#                   "lat_lng" → labels.lat + labels.lng
# All other values are alert label names looked up in locations: above.
# Reorder to change precedence; add any custom label name as an extra step.
# Default (used when this key is absent):
# geo_label_priority:
#   - geohash
#   - lat_lng
#   - datacenter
#   - location
#   - region

# ── Base-map tile themes ──────────────────────────────────────────────────────
# Each entry creates one theme button in the toolbar.
# id:      unique key used for the button ID (btn-<id>) and setTheme() call
# url:     Leaflet tile URL template — {z}/{x}/{y} plus optional {s} subdomains, {r} for retina
# default: first entry with default: true is active on page load (falls back to first entry)
# To add a new tile: append an entry here. No JS or HTML changes needed.
tiles:
  - id: dark
    label: Dark
    url: "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png"
    attribution: "&copy; <a href='https://carto.com/'>CartoDB</a> &copy; <a href='https://www.openstreetmap.org/copyright'>OpenStreetMap</a>"
    default: true
  - id: light
    label: Light
    url: "https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png"
    attribution: "&copy; <a href='https://carto.com/'>CartoDB</a> &copy; <a href='https://www.openstreetmap.org/copyright'>OpenStreetMap</a>"
  - id: streets
    label: Streets
    url: "https://tile.openstreetmap.org/{z}/{x}/{y}.png"
    attribution: "&copy; <a href='https://www.openstreetmap.org/copyright'>OpenStreetMap</a> contributors"
  - id: satellite
    label: Satellite
    url: "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}"
    attribution: "&copy; <a href='https://www.esri.com/'>Esri</a>"

# ── Optional map overlays ─────────────────────────────────────────────────────
# Each entry creates one toggle button in the toolbar.
# Data files must be downloaded first: mapwatch download-sg <layer>
# enabled: true  → auto-toggle on at startup (if the file exists)
# enabled: false → button shown, layer off by default
# To add a new layer: append an entry here. No JS or HTML changes needed.
layer_defs:
  - id: division
    label: Divisions
    file: sg-npc-boundary
    enabled: true
    style:
      type: polygon
      color: "#4fc3f7"
      weight: 1.5
      opacity: 0.8
      fill_color: "#4fc3f7"
      fill_opacity: 0.06
    tooltip:
      name_props: [NPC_NAME, Name, name]
      sub_props: [DIVISION, Division]

  - id: roads
    label: Roads
    file: sg-roads
    enabled: true
    style:
      type: line_conditional   # weight varies: motorway/trunk=3, others=2
      color: "#f97316"
      opacity: 0.65

  - id: cycling
    label: Cycling
    file: sg-cycling
    enabled: true
    style:
      type: line
      color: "#4ade80"
      weight: 2
      opacity: 0.8
      dash_array: "6,4"

  - id: mrt
    label: MRT
    file: sg-mrt
    enabled: true
    style:
      type: line
      color: "#e11d48"
      weight: 3
      opacity: 0.9
    tooltip:
      name_props: [name, ref]

  - id: busStops
    label: Bus Stops
    file: sg-bus-stops
    enabled: true
    style:
      type: point
      color: "#f59e0b"
      fill_color: "#f59e0b"
      radius: 3
      weight: 1
      opacity: 0.8
      fill_opacity: 0.6
    tooltip:
      name_props: [name, code]
      sub_props: [road]

  - id: busRoutes
    label: Bus Routes
    file: sg-bus-routes
    enabled: true
    style:
      type: line
      color: "#60a5fa"
      weight: 1
      opacity: 0.45
    tooltip:
      name_props: [service]
      sub_props: [operator]

# ── Legacy layer enable flags (kept for backward compatibility) ───────────────
# These are superseded by the enabled: field in layer_defs above.
# Kept here so older mapwatch binaries (without layer_defs support) still work.
layers:
  division:   true   # NPC police division boundaries   → mapwatch download-sg division
  roads:      true   # expressways + major roads         → mapwatch download-sg roads
  cycling:    true   # cycling paths                     → mapwatch download-sg cycling
  mrt:        true   # MRT/LRT rail lines                → mapwatch download-sg mrt
  bus_stops:  true   # bus stop points                   → mapwatch download-sg busstops
  bus_routes: true   # bus route lines                   → mapwatch download-sg busroutes

# PromQL templates shown in the side panel when clicking a marker.
query_templates:
  HighCPU:
    - label: "CPU Usage %"
      query: 'rate(node_cpu_seconds_total{mode="user",instance="{{.instance}}"}[5m]) * 100'
    - label: "Load Average 1m"
      query: 'node_load1{instance="{{.instance}}"}'
  DiskFull:
    - label: "Disk Used %"
      query: '100 - (node_filesystem_free_bytes{instance="{{.instance}}"} / node_filesystem_size_bytes{instance="{{.instance}}"} * 100)'
  MemoryLeak:
    - label: "Memory Used %"
      query: '100 - (node_memory_MemAvailable_bytes{instance="{{.instance}}"} / node_memory_MemTotal_bytes * 100)'
  default:
    - label: "CPU Usage %"
      query: 'rate(node_cpu_seconds_total{mode="user",instance="{{.instance}}"}[5m]) * 100'
