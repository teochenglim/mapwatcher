server:
  addr: ":8080"

prometheus:
  url: http://prometheus:9090          # server → Prometheus (internal Docker hostname)
  external_url: http://localhost:9090  # browser → Prometheus (override for remote deployments)
  timeout: 10s

spread:
  radius: 0.01

# ── Feature modules (all off by default) ─────────────────────────────────────
# Enable per-example in their own mapwatch.yaml:
#   examples/blink-dot/     → sound: true
#   examples/interactive-demo/ → sound+leaderboard+stats: true
modules:
  sound: false
  leaderboard: false
  stats: false

# leaderboard_url: http://exporter:8000/leaderboard   # uncomment when running interactive-demo

# ── Baseline locations ────────────────────────────────────────────────────────
# Each entry renders as a green "healthy" dot on map load.
# When an alert fires with a matching label value, the dot turns red/yellow.
# Supported alert labels (checked in geo_label_priority order):
#   datacenter: sg-dc-1   ← most common
#   location:   sg-dc-1   ← alias for datacenter
#   region:     sg-dc-1   ← same lookup
# sg-dc-1 fires 1 alert; sg-dc-2 fires 2 alerts; the rest stay green.
locations:
  sg-dc-1: w21zd3   # Singapore CBD
  sg-dc-2: w21z8k   # Singapore West
  sg-dc-3: w21zb    # Singapore North
  sg-dc-4: w21ze    # Singapore East
  sg-dc-5: w21z9    # Singapore Central

# ── Heatmap: choropleth region overlay ───────────────────────────────────────
# Each region is drawn as a filled rectangle coloured by worst alert severity.
# Any marker whose lat/lng falls inside the bounds is counted in that region.
# Shown by default; toggle off with the Heatmap button in the toolbar.
#
# Required: name, bounds: [[lat_sw, lng_sw], [lat_ne, lng_ne]]
# Optional: color: "#hex"  — overrides severity colour (red/amber/blue)
heatmap:
  regions:
    - name: "West SG"
      bounds: [[1.3203, 103.7054], [1.3958, 103.7885]]
    - name: "Central SG"
      bounds: [[1.3134, 103.8002], [1.3533, 103.8764]]

# ── Geo resolution priority ───────────────────────────────────────────────────
# Labels checked in order when placing an alert on the map.
# Sentinel values:  "geohash" → labels.geohash
#                   "lat_lng" → labels.lat + labels.lng
# All other values are alert label names looked up in locations: above.
# Reorder to change precedence; add any custom label name as an extra step.
# Default (used when this key is absent):
# geo_label_priority:
#   - geohash
#   - lat_lng
#   - datacenter
#   - location
#   - region

# ── Optional map overlays ─────────────────────────────────────────────────────
# Pre-download data files with: mapwatch download-sg <layer>
# Set true to auto-enable the overlay at startup; false = toolbar-only.
# All sources are open data — no API key required.
layers:
  division:   true   # NPC police division boundaries   → mapwatch download-sg division
  roads:      true   # expressways + major roads         → mapwatch download-sg roads
  cycling:    true   # cycling paths                     → mapwatch download-sg cycling
  mrt:        true   # MRT/LRT rail lines                → mapwatch download-sg mrt
  bus_stops:  true   # bus stop points                   → mapwatch download-sg busstops
  bus_routes: true   # bus route lines                   → mapwatch download-sg busroutes

# PromQL templates shown in the side panel when clicking a marker.
query_templates:
  HighCPU:
    - label: "CPU Usage %"
      query: 'rate(node_cpu_seconds_total{mode="user",instance="{{.instance}}"}[5m]) * 100'
    - label: "Load Average 1m"
      query: 'node_load1{instance="{{.instance}}"}'
  DiskFull:
    - label: "Disk Used %"
      query: '100 - (node_filesystem_free_bytes{instance="{{.instance}}"} / node_filesystem_size_bytes{instance="{{.instance}}"} * 100)'
  MemoryLeak:
    - label: "Memory Used %"
      query: '100 - (node_memory_MemAvailable_bytes{instance="{{.instance}}"} / node_memory_MemTotal_bytes * 100)'
  default:
    - label: "CPU Usage %"
      query: 'rate(node_cpu_seconds_total{mode="user",instance="{{.instance}}"}[5m]) * 100'
