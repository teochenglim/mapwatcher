project_name: mapwatch
version: 2

before:
  hooks:
    - go mod tidy
    # Guard: git tag must match the VERSION file
    - bash -c 'TAG=$(git describe --exact-match --tags HEAD 2>/dev/null); FILE=$(cat VERSION | tr -d "[:space:]"); [ "$TAG" = "$FILE" ] || (echo "ERROR: git tag ($TAG) does not match VERSION file ($FILE)" && exit 1)'

builds:
  - id: mapwatch
    binary: mapwatch
    main: ./cmd/mapwatch
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}}
    env:
      - CGO_ENABLED=0

archives:
  - id: default
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch
